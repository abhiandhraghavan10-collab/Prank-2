<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Silk Saree Surprise</title>
<meta property="og:title" content="🎁 Lucky Silk Saree Surprise">
<meta property="og:description" content="Tap to see if you were selected for today's surprise!">
<meta property="og:image" content="Thumbnail.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:url('Thumbnail.png') center/cover no-repeat;height:100vh;display:flex;justify-content:center;align-items:center}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.35)}
.box{position:relative;z-index:2;text-align:center;color:#fff;padding:20px;max-width:360px}
button{margin-top:20px;padding:15px 35px;font-size:20px;font-weight:bold;background:#FFD700;border:none;border-radius:10px}
#loading,#final{display:none}
.loader{width:70px;height:70px;border:8px solid rgba(255,255,255,.3);border-top:8px solid #FFD700;border-radius:50%;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{100%{transform:rotate(360deg)}}
#final img{width:260px;border-radius:15px}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="box" id="offer">
<h1>🎉 Congratulations!</h1>
<p>You have been selected for today's Lucky Silk Saree Surprise.</p>
<button onclick="start()">Claim Surprise</button>
</div>
<div class="box" id="loading">
<div class="loader"></div>
<h2>Checking eligibility...</h2>
</div>
<div class="box" id="final">
<img src="My photo .jpg" alt="Gotcha">
<h1>😂 GOTCHA!</h1>
<p>It was just a prank!</p>
</div>
<script>
function start(){
offer.style.display='none';
loading.style.display='block';
setTimeout(()=>{
loading.style.display='none';
final.style.display='block';
},3000);
}
</script>
</body>
</html>
